# Nginx 反向代理配置（可选）
#
# 用途：把 ai-vuln-hunter 从 localhost:3000 代理到 80/443 端口，
#       配合域名让同事直接通过 http://your-domain.com 访问。
#
# 安装：
#   sudo apt install nginx
#   sudo cp nginx.conf /etc/nginx/sites-available/ai-vuln-hunter
#   sudo ln -s /etc/nginx/sites-available/ai-vuln-hunter /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# 如需 HTTPS（推荐）：
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d your-domain.com

server {
    listen 80;
    # server_name your-domain.com;  # 取消注释，改成你的域名

    # 反向代理到 Node 服务
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 文件上传大小限制（默认 100MB）
        client_max_body_size 100m;
    }

    # 静态资源缓存
    location /assets/ {
        proxy_pass http://127.0.0.1:3000;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
